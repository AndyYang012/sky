<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>光遇小工具中心</title>
  <meta name="theme-color" content="#ffffff">

  <style>
    :root {
      --brand-1:#6fa8dc; --brand-2:#3d85c6;
      --bg-1:#a1c4fd; --bg-2:#c2e9fb;
      --glass: rgba(255,255,255,0.88);
      --text:#333; --muted:#666;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Noto Sans TC","PingFang TC",system-ui,-apple-system,sans-serif;
      background:linear-gradient(160deg,var(--bg-1) 0%,var(--bg-2) 100%);
      color:var(--text);line-height:1.6;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }
    header{max-width:960px;width:100%;margin:0 auto;padding:18px 16px 8px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
    h1{font-size:28px;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.25);margin:0;}
    h1 img{height:32px;vertical-align:middle;margin-right:10px;}
    .lang-select{width:auto;padding:8px 10px;border-radius:12px;border:1px solid rgba(255,255,255,.45);background:rgba(255,255,255,.9);font-weight:700;color:#345;box-shadow:0 2px 8px rgba(0,0,0,.08);}
    main{max-width:960px;margin:0 auto 32px;padding:0 16px;flex:1;width:100%;}
    .card{background:var(--glass);border-radius:18px;padding:24px;margin:18px auto;max-width:760px;box-shadow:0 12px 30px rgba(0,0,0,.15);text-align:center;}
    .card.info{text-align:left;}
    .card.info h2{text-align:center;}
    .card p{margin:0 0 18px;color:var(--muted);}
    .card ul{margin:0;padding-left:1.2em;text-align:left;color:var(--muted);line-height:1.7;}
    .card ul li{margin-bottom:8px;}
    .card h2{margin:0 0 10px;color:var(--brand-2);}
    .menu{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
    .button{display:inline-flex;align-items:center;gap:8px;padding:12px 18px;border-radius:12px;text-decoration:none;font-weight:600;font-size:16px;transition:.2s;}
    a.button.primary{background:linear-gradient(135deg,var(--brand-1),var(--brand-2));color:#fff;box-shadow:0 6px 18px rgba(61,133,198,.35);}
    a.button.primary:hover{filter:brightness(.97);transform:translateY(-1px);}
    a.button.secondary{background:#fff;color:var(--brand-2);border:1px solid rgba(61,133,198,.3);}
    a.button.secondary:hover{background:#f0f6ff;}
    .button.ghost{background:rgba(255,255,255,.55);color:#7a8796;border:1px dashed rgba(80,100,125,.35);cursor:not-allowed;}
    footer{background:rgba(30,60,120,.9);padding:18px;text-align:center;color:#fff;font-size:14px;}
    footer b{color:#ffd966;}
    footer a{color:#fff;text-decoration:none;font-weight:700;border-bottom:1px solid rgba(255,255,255,.65);}
    footer a:hover{color:#ffd966;border-bottom-color:#ffd966;}
    .tip{font-size:14px;color:#2f4a7a;margin-top:6px;font-weight:600;}
    @media (max-width:640px){
      header{align-items:flex-start;flex-direction:column;}
      .lang-select{align-self:flex-end;}
    }
  </style>
</head>
<body>
  <header>
    <h1><img src="logo.jpeg" alt="logo"><span data-i18n="appTitle">光遇小工具中心</span></h1>
    <select id="langSelect" class="lang-select" aria-label="Language">
      <option value="zh-Hant">繁中</option>
      <option value="en">English</option>
    </select>
  </header>
  <main>
    <div class="card">
      <h2 data-i18n="homeTitle">主畫面</h2>
      <p data-i18n="homeIntro">選擇想使用的工具或功能。未來更新也會在這裡出現！</p>
      <div class="menu">
        <a class="button primary" href="height.html" data-i18n="heightLink">🔍 前往身高查詢</a>
        <a class="button secondary" href="golden-guide.html" data-i18n="goldenLink">✨ 找小金人攻略（未完成）</a>
        <span class="button ghost" aria-disabled="true" data-i18n="comingSoon">📦 其他功能（敬請期待）</span>
      </div>
      <div class="tip" data-i18n="tip">歡迎收藏此頁面，最新的小工具都會集中於此。</div>
    </div>

    <div class="card info">
      <h2 data-i18n="infoTitle">功能中文解釋</h2>
      <p data-i18n="heightIntro">「身高查詢」主要幫助旅人：</p>
      <ul>
        <li data-i18n="heightPoint1">快速了解自己或朋友角色的實際身高。</li>
        <li data-i18n="heightPoint2">整理不同帳號的身高差異，方便製作對照表。</li>
      </ul>
      <p data-i18n="futureNote">若未來新增其他工具，會在此主畫面集中管理與說明。</p>
    </div>
  </main>
  <footer>
    <div><span data-i18n="author">製作者：</span><b>言陌（Andy）</b></div>
    <div><a href="https://discord.gg/MWJ3z2HMRY" target="_blank" rel="noopener" data-i18n="discordLink">加入 DC 群</a></div>
    <div data-i18n="disclaimer">本工具與 thatgamecompany 無關，僅供玩家交流與學習使用</div>
  </footer>
  <script>
const I18N = {
  "zh-Hant": {
    pageTitle: "光遇小工具中心",
    appTitle: "光遇小工具中心",
    homeTitle: "主畫面",
    homeIntro: "選擇想使用的工具或功能。未來更新也會在這裡出現！",
    heightLink: "🔍 前往身高查詢",
    goldenLink: "✨ 找小金人攻略（未完成）",
    comingSoon: "📦 其他功能（敬請期待）",
    tip: "歡迎收藏此頁面，最新的小工具都會集中於此。",
    infoTitle: "功能中文解釋",
    heightIntro: "「身高查詢」主要幫助旅人：",
    heightPoint1: "快速了解自己或朋友角色的實際身高。",
    heightPoint2: "整理不同帳號的身高差異，方便製作對照表。",
    futureNote: "若未來新增其他工具，會在此主畫面集中管理與說明。",
    author: "製作者：",
    discordLink: "加入 DC 群",
    disclaimer: "本工具與 thatgamecompany 無關，僅供玩家交流與學習使用"
  },
  en: {
    pageTitle: "Sky Tools Hub",
    appTitle: "Sky Tools Hub",
    homeTitle: "Home",
    homeIntro: "Choose the tool or feature you want to use. Future updates will appear here too.",
    heightLink: "🔍 Height checker",
    goldenLink: "✨ Winged Light guide (unfinished)",
    comingSoon: "📦 More features coming soon",
    tip: "Bookmark this page to keep the latest tools in one place.",
    infoTitle: "Feature Overview",
    heightIntro: "The height checker helps Sky players:",
    heightPoint1: "Quickly understand their own or a friend's character height.",
    heightPoint2: "Compare height differences across accounts for reference tables.",
    futureNote: "New tools will be managed and explained from this home screen.",
    author: "Created by: ",
    discordLink: "Join Discord",
    disclaimer: "This tool is not affiliated with thatgamecompany. It is for player sharing and learning only."
  }
};

let currentLang = localStorage.getItem("heightLang") || "zh-Hant";
function tr(key){ return (I18N[currentLang] && I18N[currentLang][key]) || I18N["zh-Hant"][key] || key; }
function applyLanguage(lang){
  currentLang = I18N[lang] ? lang : "zh-Hant";
  localStorage.setItem("heightLang", currentLang);
  document.documentElement.lang = currentLang;
  document.title = tr("pageTitle");
  document.querySelectorAll("[data-i18n]").forEach(el => { el.textContent = tr(el.dataset.i18n); });
  const select = document.getElementById("langSelect");
  if (select) select.value = currentLang;
}

applyLanguage(currentLang);
const langSelect = document.getElementById("langSelect");
if (langSelect) langSelect.addEventListener("change", e => applyLanguage(e.target.value));
  </script>
</body>
</html>
